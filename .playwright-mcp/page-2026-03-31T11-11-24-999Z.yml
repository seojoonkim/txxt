              - heading "Payments as infrastructure." [level=3] [ref=e651]
              - paragraph [ref=e652]: Implementing x402 on Ethereum alone requires custom contracts, unpredictable gas, and weeks of testing. Through txxt, agent.pay() works on ETH, SOL, Base, Polygon — same call, same $0.0003 cost, always.
