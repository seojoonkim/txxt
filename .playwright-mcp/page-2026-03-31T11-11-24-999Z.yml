          - heading "One middleware call. Identity + payment + any chain." [level=2] [ref=e639]:
            - text: One middleware call.
            - text: Identity + payment + any chain.
          - paragraph [ref=e640]: Other approaches require separate contracts for identity and payment on each chain. txxt unifies both into a single middleware layer — deploy once, work everywhere.
