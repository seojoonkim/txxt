        - paragraph [ref=e578]: THE PROBLEM
        - heading "Blockchains have no agent layer. So agents can't transact." [level=2] [ref=e579]:
          - text: Blockchains have no agent layer.
          - text: So agents can't transact.
        - heading "No native payment protocol. No machine-readable identity. No work verification. Three missing primitives — one middleware to fix all of them." [level=3] [ref=e580]
        - generic [ref=e581]:
          - generic [ref=e582]:
            - generic [ref=e583]: x402 PROTOCOL — PAYMENT
            - paragraph [ref=e584]: Agents have no way to pay each other.
            - paragraph [ref=e585]: HTTP has status codes for everything — except payment. x402 fixes that, but the spec alone doesn't solve cross-chain. Your Base agent can't pay a Solana agent without custom bridge code, chain-specific USDC routing, and manual gas estimation. Every chain pair = new integration.
          - generic [ref=e586]:
            - generic [ref=e587]: ERC-8004 STANDARD — IDENTITY
            - paragraph [ref=e588]: Agents have no verifiable identity.
            - paragraph [ref=e589]: A wallet address isn't an identity. ERC-8004 gives agents on-chain credentials — capabilities, reputation, owner provenance — but it's Ethereum-only. Deploy on Solana? New contract. Base? Another. Each chain is a siloed identity that can't be verified anywhere else.
        - paragraph [ref=e591]:
          - strong [ref=e592]: "The missing piece:"
          - text: payment (x402), identity (ERC-8004), and work verification (PoAW) are three separate standards on three separate layers. Without middleware to unify them, an agent checks identity on Ethereum, routes payment on Base, and hopes neither fails — 3 calls, 2 failure points, zero atomicity. That's not infrastructure. That's duct tape.
      - generic [ref=e594]:
        - paragraph [ref=e595]: HOW IT WORKS
        - heading "txxt sits between agents and blockchains." [level=2] [ref=e596]:
          - text: txxt sits between
          - text: agents and blockchains.
        - paragraph [ref=e597]: Your agent makes one API call. txxt resolves identity (ERC-8004), routes payment (x402), and verifies work (PoAW) — then settles on whichever chain you choose. No chain-specific code. No bridge logic.
