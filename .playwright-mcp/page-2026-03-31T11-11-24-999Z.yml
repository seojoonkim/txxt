              - heading "Identity without overhead." [level=3] [ref=e661]
              - paragraph [ref=e662]: Without txxt, ERC-8004 requires deploying and maintaining a separate smart contract on every chain your agent touches. With txxt, one registration creates a verified identity that works on every supported chain — zero contracts, zero gas overhead.
